stages:
  - test

phpunit:
  stage: test
  image: php:8.2
  services:
    - name: mysql:8.0
      alias: db
  variables:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: testdb
    MYSQL_USER: test
    MYSQL_PASSWORD: test
    COVERAGE_MIN: "80"
  before_script:
    - apt-get update && apt-get install -y git unzip libzip-dev libicu-dev libonig-dev
    - docker-php-ext-install pdo pdo_mysql intl mbstring zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-progress --no-interaction --prefer-dist
  script:
    - mkdir -p build/logs
    - vendor/bin/phpunit --coverage-text --coverage-clover build/logs/clover.xml | tee build/logs/coverage.txt
    - |
      coverage=$(awk -F'[:%]' '/^Lines:/ {gsub(/ /,"",$2); print $2}' build/logs/coverage.txt)
      if [ -z "$coverage" ]; then
        echo "Coverage parse failed (Lines)."
        exit 1
      fi
      awk -v coverage="$coverage" -v min="$COVERAGE_MIN" 'BEGIN {exit (coverage+0 < min)}' \
        || { echo "Coverage $coverage% is ниже минимума ${COVERAGE_MIN}%"; exit 1; }
  artifacts:
    when: always
    reports:
      junit: build/logs/junit.xml
      cobertura: build/logs/clover.xml
    paths:
      - build/coverage-html
      - build/logs
  coverage: '/Lines.*: (\d+.\d+%)/'


behat:
  stage: test
  image: php:8.2
  services:
    - name: mysql:8.0
      alias: db
  variables:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: testdb
    MYSQL_USER: test
    MYSQL_PASSWORD: test
  before_script:
    - apt-get update && apt-get install -y git unzip libzip-dev libicu-dev libonig-dev
    - docker-php-ext-install pdo pdo_mysql intl mbstring zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-progress --no-interaction --prefer-dist
  script:
    - vendor/bin/behat --format=allure --out=build/allure-results --strict --no-interaction


allure_report:
  stage: test
  image: alpine:latest
  script:
    - echo "Allure results are stored in build/allure-results"
  artifacts:
    when: always
    paths:
      - build/allure-results
    expire_in: 1 week


sonar:
  stage: test
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dsonar.login=$SONAR_TOKEN
  variables:
    SONAR_TOKEN: $SONAR_TOKEN
  only:
    - main


coverage:
  stage: test
  image: php:8.2
  variables:
    COVERAGE_MIN: "80"
    CODECOV_TOKEN: $CODECOV_TOKEN
  script:
    - mkdir -p build/logs
    - vendor/bin/phpunit --coverage-text --coverage-clover build/logs/clover.xml | tee build/logs/coverage.txt
    - |
      coverage=$(awk -F'[:%]' '/^Lines:/ {gsub(/ /,"",$2); print $2}' build/logs/coverage.txt)
      if [ -z "$coverage" ]; then
        echo "Coverage parse failed (Lines)."
        exit 1
      fi
      awk -v coverage="$coverage" -v min="$COVERAGE_MIN" 'BEGIN {exit (coverage+0 < min)}' \
        || { echo "Coverage $coverage% is ниже минимума ${COVERAGE_MIN}%"; exit 1; }
    - bash <(curl -s https://codecov.io/bash) -f build/logs/clover.xml
