services:
  _defaults:
    autowire: true
    autoconfigure: true

  PDO:
    class: PDO
    factory: ['App\Integration\Persistence\AddressPdoFactory', 'createPrimary']
    public: true

  address.rate_limit_pdo:
    class: PDO
    factory: ['App\Integration\Persistence\AddressPdoFactory', 'createRateLimit']

  App\:
    resource: '../src/'
    exclude:
      - '../src/Entity/'
      - '../src/Kernel.php'

  App\Http\Controller\AddressController:
    public: true
