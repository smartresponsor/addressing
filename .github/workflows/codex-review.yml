name: __DOMAIN__-codex-review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ai codex-review')
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin                 +refs/pull/${{ github.event.issue.number }}/head                 +refs/pull/${{ github.event.issue.number }}/merge || true

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: report/__DOMAIN__-codex-review.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: __DOMAIN__-codex-review
          path: report/
          if-no-files-found: ignore

  post:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
