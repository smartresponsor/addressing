name: addressing-agent-pr

on:
  workflow_call:
    inputs:
      task:
        type: string
        required: true
        default: "pr"
      kind:
        type: string
        required: false
        default: "fix"
      message:
        type: string
        required: false
        default: "agent update"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Domain tools (soft)
        shell: pwsh
        env:
          SR_DOMAIN: "addressing"
          SR_CANON_REQUIRED: "0"
        run: |
          Set-Location "${{ github.workspace }}"

          pwsh -NoProfile -File Domain/Tool/run.ps1 doctor -Domain "addressing" -Repo "${{ github.workspace }}"
          $global:LASTEXITCODE = 0

          pwsh -NoProfile -File Domain/Tool/run.ps1 scan -Domain "addressing"
          $global:LASTEXITCODE = 0

          pwsh -NoProfile -File Domain/Tool/run.ps1 health -Domain "addressing" -Repo "${{ github.workspace }}"
          $global:LASTEXITCODE = 0

          pwsh -NoProfile -File Domain/Tool/run.ps1 validate -Domain "addressing" -Repo "${{ github.workspace }}" -AllowMissing
          $global:LASTEXITCODE = 0

          # No-AI mode:
          # - do not call plan/codex tools that require OPENAI_API_KEY
          # - rely on report-driven envelopes

      - name: Ensure report envelopes (no-AI mode)
        shell: pwsh
        run: |
          if (-not (Test-Path "report")) { New-Item -ItemType Directory -Force -Path "report" | Out-Null }

          $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $repo = "${{ github.repository }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          $files = @(
            @{ path = "report/addressing-pr-envelope.md"; title = "addressing PR envelope" },
            @{ path = "report/addressing-ai-plan.md"; title = "addressing ai plan" },
            @{ path = "report/addressing-codex-review.md"; title = "addressing codex review" }
          )

          foreach ($f in $files) {
            $p = $f.path
            if (Test-Path $p) {
              Write-Host "OK: $p exists"
              continue
            }

            $lines = @(
              "No-AI stub: $($f.title).",
              "",
              "Generated: $ts",
              "Repo: $repo",
              "Run: $runUrl",
              "",
              "Fill this file manually or by later automation."
            )

            Set-Content -Path $p -Value $lines -Encoding UTF8
            Write-Host "OK: created $p"
          }

      - name: Prepare PR branch (task=pr)
        if: ${{ inputs.task == 'pr' }}
        shell: bash
        run: |
          set -euo pipefail
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          kind="${{ inputs.kind }}"
          kind="$(echo "$kind" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-' )"
          if [ -z "$kind" ]; then kind="fix"; fi
          br="ai/${kind}-${ts}"
          echo "KIND=$kind" >> "$GITHUB_ENV"
          echo "BRANCH=$br" >> "$GITHUB_ENV"
          git checkout -b "$br"

      - name: Commit allow-listed files (task=pr)
        if: ${{ inputs.task == 'pr' }}
        shell: bash
        run: |
          set -euo pipefail

          bad="$(git status --porcelain | awk '{print $2}' | grep -vE '^(Domain/|\.github/workflows/|docs/|report/)' || true)"
          if [ -n "$bad" ]; then
            echo "Blocked paths detected:"
            echo "$bad"
            exit 2
          fi

          git add Domain/ .github/workflows/ docs/ report/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          msg="${{ inputs.message }}"
          kind="${KIND:-fix}"
          git commit -m "${kind}: ${msg}"

      - name: Push branch (task=pr)
        if: ${{ inputs.task == 'pr' }}
        shell: bash
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH"

      - name: Create PR (task=pr)
        if: ${{ inputs.task == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          kind="${KIND:-fix}"
          title="${kind}: ${{ inputs.message }}"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          cat > /tmp/pr_body.txt <<EOF
          Automated agent PR (no-AI mode).

          - Task: ${{ inputs.task }}
          - Kind: ${KIND:-fix}
          - Run: $run_url
          - Envelope: report/addressing-pr-envelope.md
          EOF
          gh pr create --base master --head "$BRANCH" --title "$title" --body-file /tmp/pr_body.txt || true

      - name: Upload agent artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addressing-agent-report
          path: report/
          if-no-files-found: ignore
