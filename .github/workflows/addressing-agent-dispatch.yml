name: addressing-agent-dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "run only (reserved for future)"
        required: true
        default: "pr"
      kind:
        description: "fix|hotfix|feat|chore|docs|refactor"
        required: false
        default: "fix"
      message:
        description: "Short reason (used in commit message)"
        required: false
        default: "agent update"

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    uses: ./.github/workflows/addressing-agent-run.yml
    with:
      task: ${{ inputs.task }}
      kind: ${{ inputs.kind }}
      message: ${{ inputs.message }}
