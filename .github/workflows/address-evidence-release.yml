name: address-evidence-release

on:
  workflow_dispatch:
  push:
    tags:
      - "address-*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell
        shell: bash
        run: |
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Domain report (soft)
        shell: pwsh
        env:
          SR_CANON_REQUIRED: "0"
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE 'Domain/Tool/run.ps1'
          if (-not (Test-Path $script)) { throw "Missing Domain/Tool/run.ps1" }

          # soft: we want evidence even if doctor/validate says ok=false
          & pwsh -NoProfile -File $script doctor
          $global:LASTEXITCODE = 0
          & pwsh -NoProfile -File $script scan
          $global:LASTEXITCODE = 0
          & pwsh -NoProfile -File $script health
          $global:LASTEXITCODE = 0
          & pwsh -NoProfile -File $script validate -AllowMissing
          $global:LASTEXITCODE = 0
          exit 0

      - name: Evidence pack
        id: pack
        shell: pwsh
        run: |
          $p = Join-Path $env:GITHUB_WORKSPACE 'Domain/Tool/evidence-pack.ps1'
          if (-not (Test-Path $p)) { throw "Missing Domain/Tool/evidence-pack.ps1" }
          & pwsh -NoProfile -File $p -Domain "address" -Sketch "32"
          exit 0

      - name: Upload evidence to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.evidence_zip }}
          fail_on_unmatched_files: true

      - name: Attest build provenance
        if: ${{ github.event.repository.private != true }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.pack.outputs.evidence_zip }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-report
          path: report/
          if-no-files-found: ignore
