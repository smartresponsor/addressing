name: doc-pages

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: doc-pages
  cancel-in-progress: true

env:
  # Set this to the directory produced by your existing build-docs step.
  DOC_OUTPUT_DIR: docs-build

  # Cloudflare Pages
  CF_PAGES_PROJECT: address-doc
  CF_PAGES_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Replace the steps below with your existing build-docs recipe.
      # Keep the output at env.DOC_OUTPUT_DIR.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build doc
        run: npm run build-doc
        env:
          DOC_OUTPUT_DIR: ${{ env.DOC_OUTPUT_DIR }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DOC_OUTPUT_DIR }}

      - name: Upload Cloudflare artifact
        uses: actions/upload-artifact@v4
        with:
          name: doc-site
          path: ${{ env.DOC_OUTPUT_DIR }}

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

  deploy-cloudflare-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: doc-site
          path: ${{ env.DOC_OUTPUT_DIR }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy "${{ env.DOC_OUTPUT_DIR }}"
            --project-name "${{ env.CF_PAGES_PROJECT }}"
            --branch "${{ env.CF_PAGES_BRANCH }}"
