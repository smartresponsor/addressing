name: address-gate

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Domain gate
        shell: pwsh
        run: |
          pwsh -NoProfile -File Domain/Tool/run.ps1 doctor
          pwsh -NoProfile -File Domain/Tool/run.ps1 scan
          pwsh -NoProfile -File Domain/Tool/run.ps1 health
          pwsh -NoProfile -File Domain/Tool/run.ps1 validate


      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-report
          path: report/
          if-no-files-found: ignore
