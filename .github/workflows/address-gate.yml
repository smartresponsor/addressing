name: address-gate

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Domain gate
        shell: pwsh
        env:
          SR_CANON_REQUIRED: "0"
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE 'Domain/Tool/run.ps1'
          if (-not (Test-Path $script)) { throw "Missing Domain/Tool/run.ps1" }
          
          function Read-OkFlag([string]$path) {
          if (-not (Test-Path $path)) { return $true }
          try {
          $j = Get-Content $path -Raw | ConvertFrom-Json
          if ($null -ne $j.ok) { return [bool]$j.ok }
          } catch {}
            return $true
          }

          # doctor (strict only if report ok=false)
          & $script doctor
          $doctorExit = $LASTEXITCODE
          $doctorOk = Read-OkFlag (Join-Path $env:GITHUB_WORKSPACE 'report/address-doctor.json')
          if (-not $doctorOk) { Write-Host "ERROR: doctor report ok=false (exit=$doctorExit)"; exit 1 }
          if ($doctorExit -ne 0) { Write-Host "WARN: doctor exit=$doctorExit but report ok=true; continuing." }
            $global:LASTEXITCODE = 0
          
            # scan (already skip-safe when Canon missing)
            & $script scan
            $global:LASTEXITCODE = 0
          
            # health (warn-only on PR/push)
            & $script health
            $global:LASTEXITCODE = 0
          
            # validate (strict only if report ok=false)
            & $script validate -AllowMissing
            $valExit = $LASTEXITCODE
            $valOk = Read-OkFlag (Join-Path $env:GITHUB_WORKSPACE 'report/address-report-validate.json')
          if (-not $valOk) { Write-Host "ERROR: validate report ok=false (exit=$valExit)"; exit 1 }
          if ($valExit -ne 0) { Write-Host "WARN: validate exit=$valExit but report ok=true; continuing." }
            $global:LASTEXITCODE = 0
          
            exit 0


      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-report
          path: report/
          if-no-files-found: ignore
