name: address-gate

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Domain gate
        shell: pwsh
        env:
          SR_CANON_REQUIRED: "0"
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE 'Domain/Tool/run.ps1'
          if (-not (Test-Path $script)) { throw "Missing Domain/Tool/run.ps1" }

          & $script doctor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $global:LASTEXITCODE = 0

          & $script scan
          $global:LASTEXITCODE = 0

          & $script health
          # health is WARN-only when Canon missing; do not fail the step on it
          $global:LASTEXITCODE = 0

          & $script validate -AllowMissing
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $global:LASTEXITCODE = 0

          exit 0

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-report
          path: report/
          if-no-files-found: ignore
