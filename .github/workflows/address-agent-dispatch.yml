name: address-agent-dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run via Domain/Tool/run.ps1"
        required: true
        type: choice
        options:
          - scan
          - health
          - doctor
          - validate
          - plan
          - codex
      note:
        description: "Optional note for traceability"
        required: false
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run task
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SR_ALLOW_APPLY: "0"
        run: |
          ./Domain/Tool/run.ps1 ${{ inputs.task }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-report
          path: report/
