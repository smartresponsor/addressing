name: addressing-evidence-release

on:
  workflow_dispatch:
  push:
    tags:
      - "addressing-*"

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: write

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          coverage: none

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Domain report (soft)
        shell: bash
        env:
          SR_DOMAIN: "addressing"
          SR_CANON_REQUIRED: "0"
        run: |
          if [ -f "Domain/Tool/run.ps1" ]; then
            pwsh -NoProfile -File Domain/Tool/run.ps1 doctor -Domain "addressing" -Repo "${{ github.workspace }}" || true
            pwsh -NoProfile -File Domain/Tool/run.ps1 scan -Domain "addressing" || true
            pwsh -NoProfile -File Domain/Tool/run.ps1 health -Domain "addressing" -Repo "${{ github.workspace }}" || true
            pwsh -NoProfile -File Domain/Tool/run.ps1 validate -Domain "addressing" -Repo "${{ github.workspace }}" -AllowMissing || true
          else
            echo "Skipping domain report: Domain/Tool/run.ps1 is not present in this repository."
          fi

      - name: Evidence pack
        id: pack
        shell: bash
        env:
          SR_DOMAIN: "addressing"
        run: |
          if [ -f "Domain/Tool/evidence-pack.ps1" ]; then
            kind="run"
            ref=""
            if [ "${{ github.ref_type }}" = "tag" ]; then
              kind="tag"
              ref="${{ github.ref_name }}"
            fi
            pwsh -NoProfile -File Domain/Tool/evidence-pack.ps1 -Domain "addressing" -Kind "$kind" -Ref "$ref" -Train "${{ vars.SR_TRAIN }}" || true
          else
            echo "Skipping evidence pack: Domain/Tool/evidence-pack.ps1 is not present in this repository."
          fi

      - name: Upload evidence to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.evidence_zip }}
          fail_on_unmatched_files: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.pack.outputs.evidence_zip }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addressing-report
          path: report/
          if-no-files-found: ignore
