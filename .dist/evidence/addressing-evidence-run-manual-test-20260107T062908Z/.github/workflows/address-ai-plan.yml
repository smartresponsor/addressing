name: address-ai-plan

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Git ref to analyze (default: master)"
        required: false
        default: "master"
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/ai plan'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.target_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.issue.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run plan-only
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if (-not $env:OPENAI_API_KEY) { throw "Missing secret OPENAI_API_KEY" }
          if (-not (Test-Path "Domain/Tool/run.ps1")) { throw "Missing Domain/Tool/run.ps1" }
          ./Domain/Tool/run.ps1 plan

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-ai-report
          path: report/
          if-no-files-found: ignore

      - name: Comment PR (short)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'report/address-ai-plan.md';
            const exists = fs.existsSync(path);
            const body = exists
              ? "AI plan generated. See workflow artifacts: address-ai-report."
              : "AI plan workflow finished, but report/address-ai-plan.md was not found. Check job logs.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
